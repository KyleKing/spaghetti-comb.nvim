[tools]
stylua = "latest"
"cargo:selene" = "latest"

[tasks."deps-mini-nvim"]
description = "Download 'mini.nvim' to use its 'mini.test' testing module"
run = '''
DIRECTORY="deps/mini.nvim"
if [ ! -d "$DIRECTORY" ]; then
    mkdir -p "$DIRECTORY"
    git clone --filter=blob:none https://github.com/echasnovski/mini.nvim "$DIRECTORY"
fi
'''
sources = ["deps/mini.nvim"]

[tasks.test]
depends = ["deps-mini-nvim"]
description = "Run all test files"
run = "nvim --headless --noplugin -u ./scripts/minimal_init.lua -c \"lua require('spaghetti-comb.tests.init').run_all()\" -c \"qa!\""

[tasks.test-file]
depends = ["deps-mini-nvim"]
description = "Run test from specified file"
run = "nvim --headless --noplugin -u ./scripts/minimal_init.lua -c \"lua MiniTest.run_file('{{flag(name='file')}}')\" -c \"qa!\""
usage = '''
flag "-f --file"
'''

[tasks.lint]
description = "Format code using stylua (check mode)"
run = "stylua scripts/ plugin/ lua/ --check"

[tasks.format]
description = "Format code using stylua (fix mode)"
run = "stylua scripts/ plugin/ lua/"

[tasks.typecheck]
description = "Check for errors with selene"
run = "selene scripts/ plugin/ lua/"

[tasks.docs]
depends = ["deps-mini-nvim"]
description = "Generate vim help tags (help doc not yet written; see ROADMAP.md)"
run = [
  "mkdir -p doc",
  "nvim --headless -c 'helptags doc/' -c 'qa!'",
]
